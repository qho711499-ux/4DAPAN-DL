<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Địa Lí 10 - 68 Câu Trắc Nghiệm</title>
    <style>
        :root {
            --primary: #1a73e8;
            --correct: #2e7d32;
            --wrong: #d93025;
            --bg: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 40px; text-transform: uppercase; }
        
        .question-item {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            transition: 0.3s;
        }
        .q-text { font-weight: 600; font-size: 1.1em; display: block; margin-bottom: 15px; color: #3c4043; }
        
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }

        .option-label {
            padding: 12px 15px;
            border: 1px solid #dadce0;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            background: #fff;
        }
        .option-label:hover { background-color: #f1f3f4; }
        
        /* Màu sắc khi nộp bài */
        .is-correct { 
            background-color: #e6f4ea !important; 
            border-color: var(--correct) !important;
            color: var(--correct);
            font-weight: bold;
        }
        .is-wrong { 
            background-color: #fce8e6 !important; 
            border-color: var(--wrong) !important;
            color: var(--wrong);
        }

        .action-bar {
            position: sticky; bottom: 0;
            background: white; padding: 20px;
            text-align: center; box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
            margin-top: 50px; border-top: 1px solid #eee;
        }
        button {
            background-color: var(--primary);
            color: white; border: none;
            padding: 15px 45px; border-radius: 30px;
            font-size: 1.1em; cursor: pointer; font-weight: 600;
            transition: 0.3s;
        }
        button:hover { background-color: #1557b0; transform: translateY(-2px); }

        #result-popup {
            display: none; position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 1000; text-align: center;
        }
        .overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 999;
        }
    </style>
</head>

    const quizBox = document.getElementById('quiz-box');

    function renderQuiz() {
        quizBox.innerHTML = data.map((item, idx) => `
            <div class="question-item" id="item-${idx}">
                <span class="q-text">${item.q}</span>
                <div class="options-grid">
                    ${item.options.map((opt, i) => `
                        <label class="option-label" id="label-${idx}-${i}">
                            <input type="radio" name="q${idx}" value="${i}">
                            <span style="margin-left:8px">${String.fromCharCode(65+i)}. ${opt}</span>
                        </label>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function checkAnswers() {
        let score = 0;
        data.forEach((item, idx) => {
            const selected = document.querySelector(`input[name="q${idx}"]:checked`);
            const correctLabel = document.getElementById(`label-${idx}-${item.a}`);
            
            // Hiện đáp án đúng màu xanh
            correctLabel.classList.add('is-correct');
            
            if (selected) {
                const val = parseInt(selected.value);
                if (val === item.a) {
                    score++;
                } else {
                    document.getElementById(`label-${idx}-${val}`).classList.add('is-wrong');
                }
            }
            
            // Khóa các radio
            const inputs = document.getElementsByName(`q${idx}`);
            inputs.forEach(input => input.disabled = true);
        });

        const finalScore = ((score / data.length) * 10).toFixed(1);
        document.getElementById('score-circle').innerText = finalScore;
        document.getElementById('score-detail').innerText = `Bạn đã trả lời đúng ${score} trên tổng số ${data.length} câu hỏi.`;
        
        document.getElementById('overlay').style.display = 'block';
        document.getElementById('result-popup').style.display = 'block';
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('retry-btn').style.display = 'inline-block';
    }

    function closeResult() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('result-popup').style.display = 'none';
    }

    window.onload = renderQuiz;
</script>
